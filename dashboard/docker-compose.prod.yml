# Production override for runtime.chimera-protocol.com
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  backend:
    ports: []
    environment:
      - CHIMERA_SECRET_KEY=${CHIMERA_SECRET_KEY}
      - CHIMERA_CORS_ORIGINS=https://runtime.chimera-protocol.com
      - CHIMERA_LICENSE_PRIVATE_KEY=${CHIMERA_LICENSE_PRIVATE_KEY}
    networks:
      - web
      - default

  frontend:
    ports: []
    build:
      args:
        - NEXT_PUBLIC_API_URL=https://api-runtime.chimera-protocol.com/api/v1
    networks:
      - web
      - default

networks:
  web:
    external: true

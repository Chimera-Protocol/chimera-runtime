# chimera-runtime configuration
# Generated by: chimera-runtime init
# Docs: https://github.com/Chimera-Protocol/project-chimera
#
# API keys should be set via environment variables:
#   export CHIMERA_API_KEY=sk-...
#

agent:
  name: chimera-runtime
  version: 0.1.0
llm:
  provider: none
  model: external
  temperature: 0.0
  max_retries: 3
  candidates_per_attempt: 3
policy:
  file: ./policies/starter.yaml
  auto_verify: true
audit:
  enabled: true
  output_dir: ./audit_logs
  format: json
  html_reports: true
  retention_days: 180
oversight:
  require_confirmation: false
  allow_override: true
  policy_hot_reload: true
  stop_on_consecutive_blocks: 5
causal:
  enabled: false
